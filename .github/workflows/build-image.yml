name: Build Raspberry Pi Jamulus Image

on:
  workflow_dispatch:
#  push:
#    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      - name: Install pi-gen host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            ca-certificates \
            gnupg \
            debian-archive-keyring \
            coreutils \
            quilt \
            parted \
            qemu-user-binfmt \
            arch-test \
            debootstrap \
            zerofree \
            zip \
            dosfstools \
            libarchive-tools \
            libcap2-bin \
            grep \
            rsync \
            xz-utils \
            file \
            curl \
            bc \
            qemu-utils \
            kpartx \
            gpg \
            pigz

      - name: Clone pi-gen
        run: |
          git clone --depth=1 --branch arm64 https://github.com/RPi-Distro/pi-gen.git

      - name: Add custom stage
        run: |
          cp -r stage-jamulus pi-gen/

          # pi-gen custom stages should have a prerun.sh when they follow another stage.
          if [ ! -f pi-gen/stage-jamulus/prerun.sh ]; then
            cat > pi-gen/stage-jamulus/prerun.sh <<'EOF'
          #!/bin/bash -e
          if [ ! -d "${ROOTFS_DIR}" ]; then
            copy_previous
          fi
          EOF
          fi

          chmod +x pi-gen/stage-jamulus/prerun.sh
          chmod +x pi-gen/stage-jamulus/01-configure/00-run.sh || true

      - name: Configure pi-gen
        run: |
          cat > pi-gen/config <<'EOF'
          IMG_NAME='rpi4-jamulus'
          RELEASE='bookworm'
          ARCH='arm64'

          STAGE_LIST='stage0 stage1 stage2 stage-jamulus'

          ENABLE_SSH=1
          FIRST_USER_NAME='pi'
          FIRST_USER_PASS='jamulus'
          DISABLE_FIRST_BOOT_USER_RENAME=1
          TIMEZONE='America/Sao_Paulo'
          KEYBOARD_LAYOUT='us'

          DEPLOY_COMPRESSION='xz'
          EXPORT_LAST_STAGE_ONLY=1
          EOF

      - name: Show pi-gen config
        run: |
          cat pi-gen/config

      - name: Verify architecture support
        run: |
          arch-test arm64 || true
          dpkg -L qemu-user-binfmt | grep -E 'qemu-aarch64|binfmt' || true

      - name: Build image
        run: |
          cd pi-gen
          sudo ./build.sh

      - name: List deploy output
        run: |
          ls -lah pi-gen/deploy

